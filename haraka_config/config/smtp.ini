; Main SMTP Settings
listen=0.0.0.0:25,0.0.0.0:587

; Use all CPU cores for high-volume bulk sending
nodes=cpus

; Timeouts for busy remote servers (Gmail/Outlook)
unrecognized_command_timeout=30
data_timeout=300

[headers]
; Adds a header to show Haraka processed the mail
add_received_header=true

[auth]
; Required for your local API to send mail securely
methods=PLAIN,LOGIN